[workspace]
authors = ["ahr <ahrasheed@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly/", "conda-forge"]
name = "kompass-mojo"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
mojo = "*"
cmake = "*"

[tasks]
build = { cmd = "mkdir -p build && mojo build -I src --emit shared-lib -o build/libkompass_mojo.so src/kompass_mojo/ffi.mojo" }
build-harness = { cmd = "cmake -S integration -B integration/build -DCMAKE_BUILD_TYPE=Release && cmake --build integration/build --parallel", depends-on = ["build"] }
benchmark = { cmd = "bash -c 'mkdir -p results && integration/build/kompass_benchmark_mojo ${PLATFORM:-gpu} results/${PLATFORM:-gpu}.json'", depends-on = ["build-harness"] }
test = { cmd = "mojo run -I src tests/test_cost_evaluator.mojo" }
test-mapper = { cmd = "mojo run -I src tests/test_local_mapper.mojo" }
test-critical-zone = { cmd = "mojo run -I src tests/test_critical_zone.mojo" }
